<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURAL_SNAKE_OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

    body {
      background-color: #050505;
      color: #0ff;
      font-family: 'VT323', monospace;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    .font-header {
      font-family: 'Press Start 2P', cursive;
    }

    /* CRT Scanlines Overlay */
    .scanlines {
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0),
        rgba(255, 255, 255, 0) 50%,
        rgba(0, 0, 0, 0.25) 50%,
        rgba(0, 0, 0, 0.25)
      );
      background-size: 100% 4px;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* CRT Flicker */
    .flicker {
      animation: crt-flicker 0.15s infinite;
      pointer-events: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 255, 255, 0.02);
      z-index: 49;
    }

    @keyframes crt-flicker {
      0% { opacity: 0.9; }
      50% { opacity: 1; }
      100% { opacity: 0.8; }
    }

    /* Screen Tear Animation applied to main container */
    .screen-tear {
      animation: tear 5s infinite;
    }

    @keyframes tear {
      0%, 95% { transform: translateX(0) skewX(0); }
      96% { transform: translateX(-4px) skewX(2deg); }
      97% { transform: translateX(4px) skewX(-2deg); }
      98% { transform: translateX(0) skewX(0); }
    }

    /* Glitch Text Keyframes */
    @keyframes glitch-anim-1 {
      0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
      20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
      40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
      60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
      80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
      100% { clip-path: inset(30% 0 50% 0); transform: translate(1px, -1px); }
    }

    @keyframes glitch-anim-2 {
      0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
      20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); }
      40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, -2px); }
      60% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, 2px); }
      80% { clip-path: inset(50% 0 30% 0); transform: translate(1px, -1px); }
      100% { clip-path: inset(5% 0 80% 0); transform: translate(-1px, 1px); }
    }

    /* Custom Scrollbar for terminal feel */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #000;
      border-left: 1px solid #0ff;
    }
    ::-webkit-scrollbar-thumb {
      background: #0ff;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #f0f;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="flicker"></div>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
